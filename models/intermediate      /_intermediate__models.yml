version: 2

models:
  - name: int_jobs_unified
    description: "Dữ liệu 3 nguồn (ITviec, VietnamWorks, CareerViet) được hợp nhất bằng UNION ALL"
    columns:
      - name: job_id
        tests:
          - not_null

  - name: int_dates_normalized
    description: "Chuẩn hóa các định dạng ngày đăng tuyển khác nhau về kiểu DATE thống nhất"
    columns:
      - name: posted_at
        tests:
          - dbt_utils.accepted_range:
              arguments:
                max_value: "current_date()"
                inclusive: true

  - name: int_title_parsed
    columns:
      - name: job_level
        tests:
          - accepted_values:
              arguments: # Bọc cấu trúc theo đúng quy định dbt 2.0
                values: ['Intern', 'Fresher', 'Junior', 'Middle', 'Senior', 'Manager/Lead', 'Null']
  
  - name: int_role_classified
    description: "Phân loại nghề nghiệp (core_role) dựa trên từ khóa trong tiêu đề công việc"
    columns:
      - name: core_role
        tests:
          - not_null

  - name: int_salary_parsed
    description: "Trích xuất và quy đổi mức lương về đơn vị VND"
    columns:
      - name: salary_min_vnd
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1000000000
                inclusive: true
              config:
                severity: warn

  - name: int_location_normalized
    description: "Chuẩn hóa địa điểm làm việc về tên tỉnh/thành phố thống nhất"
    columns:
      - name: location_clean
        tests:
          - not_null

  - name: int_company_normalized
    description: "Chuẩn hóa tên công ty, loại bỏ loại hình doanh nghiệp và ký tự thừa"
    columns:
      - name: company_name_clean
        tests:
          - not_null

  - name: int_jobs_filtered_it
    description: "Lọc chỉ giữ lại các tin tuyển dụng thuộc ngành Data"

  - name: int_jobs_deduplicated
    description: "Khử trùng lặp giữa các nguồn, ưu tiên bản ghi có lương và ngày đăng đầy đủ"
    columns:
      - name: job_id
        tests:
          - not_null
          - unique

  - name: int_skill_extracted
    description: "Trích xuất kỹ năng từ trường tags và mô tả công việc theo whitelist"

  - name: int_skill_normalized
    description: "Chuẩn hóa các biến thể tên gọi của cùng một kỹ năng (alias mapping)"
    columns:
      - name: job_id
        tests:
          - not_null